<script>
document.addEventListener("DOMContentLoaded", function () {

  const params = new URLSearchParams(window.location.search);
  const service = params.get("service");

  const erpSection = document.getElementById("erpSection");
  const imagesSection = document.getElementById("imagesSection");
  const imageContainer = document.getElementById("imageContainer");

  const content = {
    erp: {
      type: "video",
      intro: "https://drive.google.com/file/d/1rCmjzZPmBWCEVjN9ScODaSTf87WpCkO-/preview",
      presentation: "https://drive.google.com/file/d/1G8eO9iMtU0TPjlHDZ3MCqiZXq2-TLq3O/preview",
      pdf: "خريطة تدفق العمليات -لنظام ابصار.pdf"
    },
    hr: {
      type: "images",
        images: Array.from({ length: 14 }, (_, i) => i + 1)
    .filter(num => num !== 5) // استثناء hr5
    .map(num => `img/hr/hr${num}.jpg`)

    },
    crm: {
      type: "images",
        images: Array.from({ length: 10 }, (_, i) => `img/crm/crm${i + 1}.jpg`)

    }
  };

  if (!content[service]) return;

  // ERP
  if (content[service].type === "video") {
    erpSection.style.display = "block";
    imagesSection.style.display = "none";

    document.getElementById("introVideo").src = content[service].intro;
    document.getElementById("presentationVideo").src = content[service].presentation;
    document.getElementById("pdfViewer").src = content[service].pdf;
  }

  // HR + CRM
  if (content[service].type === "images") {
    erpSection.style.display = "none";
    imagesSection.style.display = "block";

    imageContainer.innerHTML = "";

    content[service].images.forEach(src => {
      imageContainer.innerHTML += `
        <div class="col-md-4 mb-3">
          <span onclick="closeImgModal()" style="position:absolute;top:20px;right:30px;color:white;font-size:30px;cursor:pointer;">×</span>
<img src="${src}"
     class="img-fluid rounded shadow-sm"
     style="cursor:pointer;padding:0;object-fit:cover;height:200px;width:100%;"
     onclick="openImgModal('${src}')"/>        </div>
      `;
    });
  }

});
function openImgModal(src) {
  document.getElementById("modalImg").src = src;
  document.getElementById("imgModal").style.display = "flex";
}

function closeImgModal() {
  document.getElementById("imgModal").style.display = "none";
}

</script>
